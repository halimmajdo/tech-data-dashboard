<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechData // Live Market Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand">Tech<span>Data</span></div>
        <button id="refresh-btn" class="refresh-btn">🔄 Refresh Feed</button>
    </header>

    <main class="dashboard-wrapper">
        <section class="intro-banner">
            <h1>Live Crypto & Asset Terminal</h1>
            <p>Fetching real-time market valuations directly from public web service protocols.</p>
        </section>

        <div id="loading-indicator" class="loader">Synchronizing remote servers...</div>
        <div id="error-message" class="error-box">Failed to connect to data networks. Please try again.</div>

        <section class="data-grid" id="data-grid">
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
